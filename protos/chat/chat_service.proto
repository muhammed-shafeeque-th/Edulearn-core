syntax = "proto3";

package chat_service;

service ChatService {
  // Chats
  rpc CreateChat(CreateChatRequest) returns (ChatResponse);
  rpc GetChat(GetChatRequest) returns (ChatResponse);
  rpc DeleteChat(DeleteChatRequest) returns (Empty);
  rpc ListStudentChats(ListStudentChatsRequest) returns (ChatsListResponse);
  rpc ListInstructorChats(ListInstructorChatsRequest) returns (ChatsListResponse);

  rpc PinChat(PinChatRequest) returns (ChatResponse);
  rpc UnPinChat(UnPinChatRequest) returns (ChatResponse);
  rpc ArchiveChat(ArchiveChatRequest) returns (ChatResponse);
  rpc UnArchiveChat(UnArchiveChatRequest) returns (ChatResponse);
  rpc MuteChat(MuteChatRequest) returns (ChatResponse);
  rpc UnMuteChat(UnMuteChatRequest) returns (ChatResponse);

  // User Presence
  rpc GetOnlineUsers(Empty) returns (OnlineUsersResponse);

  // Messages
  rpc SendMessage(SendMessageRequest) returns (MessageResponse);
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);
  rpc EditMessage(EditMessageRequest) returns (MessageResponse);
  rpc DeleteMessage(DeleteMessageRequest) returns (Empty);
  rpc MarkMessagesRead(MarkMessagesReadRequest) returns (ChatResponse);

  // Reactions
  rpc AddReaction(AddReactionRequest) returns (MessageResponse);
  rpc RemoveReaction(RemoveReactionRequest) returns (MessageResponse);

  // Discussion
  rpc CreateOrGetDiscussionRoom(CreateDiscussionRoomRequest) returns (DiscussionRoomResponse);
  rpc SendDiscussionMessage(SendDiscussionMessageRequest) returns (DiscussionMessageResponse);
  rpc GetDiscussionMessages(GetDiscussionMessagesRequest) returns (GetDiscussionMessagesListResponse);
}

// Generic Error Message
message Error {
  string code = 1; // e.g., "RESOURCE_NOT_FOUND", "INVALID_ARGUMENT", "UNAUTHENTICATED"
  string message = 2;
  repeated ErrorDetail details = 3; // Optional detailed error information
}

message ErrorDetail {
  optional string field = 1;
  string message = 2;
}

message Empty {}

message PaginationRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ChatData {
  string id = 1;
  string student_id = 3;
  string instructor_id = 4;
  string created_at = 5;
  string updated_at = 6;
  string last_message_id = 7;

  // viewer specific
  bool is_pinned = 20;
  bool is_archived = 21;
  bool is_muted = 22;
}

message MessageReaction {
  string id = 1;
  string user_id = 2;
  string emoji = 3;
  int64 timestamp = 4;
}

message MessageData {
  string id = 1;
  string chat_id = 2;
  string sender_id = 3;
  string content = 4;
  string created_at = 5;
  string updated_at = 6;

  int64 sequence = 10;
  repeated MessageReaction reactions = 20;
}

// --- Requests

message CreateChatRequest {
  string student_id = 1;
  string instructor_id = 2;
  string role = 3;
}

message ChatResponse {
  oneof result {
      ChatData chat = 1;
      Error error = 2 ;
  }
}

message GetChatRequest {
  string chat_id = 1;
  string user_id = 2;
}


message DeleteChatRequest {
  string chat_id = 1;
  string user_id = 2;
}

message ListStudentChatsRequest {
  string student_id = 1;
  PaginationRequest pagination = 2;
}

message ListInstructorChatsRequest {
  string instructor_id = 1;
  PaginationRequest pagination = 2;
}

message ChatsResponse {
  repeated ChatData chats = 1;
  int32 total = 2;
}


message ChatsListResponse {
  oneof result {
      ChatsResponse chats = 1;
      Error error = 2 ;
  }

}

message PinChatRequest {
  string chat_id = 1;
  string user_id = 2;
}
message UnPinChatRequest {
  string chat_id = 1;
  string user_id = 2;
}

message ArchiveChatRequest {
  string chat_id = 1;
  string user_id = 2;
}
message UnArchiveChatRequest {
  string chat_id = 1;
  string user_id = 2;
}

message MuteChatRequest {
  string chat_id = 1;
  string user_id = 2;
  optional int64 duration_seconds = 3;
}
message UnMuteChatRequest {
  string chat_id = 1;
  string user_id = 2;
}

// Messages

message SendMessageRequest {
  string chat_id = 1;
  string sender_id = 2;
  string content = 3;

  // client generates idempotencyKey per message
  string idempotency_key = 4;
}

message GetMessagesRequest {
  string chat_id = 1;
  string user_id = 2;
  PaginationRequest pagination = 3;
}
message MessagesResponse {
  repeated MessageData messages = 1;
  int32 total = 2;

}

message GetMessagesResponse {
  oneof result {
      MessagesResponse messages = 1;
      Error error = 2 ;
  }
}
message OnlineUsersResponse {
  oneof result {
      OnlineUsers success = 1;
      Error error = 2 ;
  }
}

message EditMessageRequest {
  string chat_id = 1;
  string message_id = 2;
  string user_id = 3;
  string content = 4;
}

message OnlineUsers {
  repeated string users = 1;
}

message MessageResponse {
  oneof result {
    MessageData message = 1;
    Error error = 2;
  }
}

message DeleteMessageRequest {
  string message_id = 1;
  string user_id = 2;
  bool for_every_one = 3;
}

message MarkMessagesReadRequest {
  string chat_id = 1;
  string user_id = 2;
}

// Reactions

message AddReactionRequest {
  string message_id = 1;
  string user_id = 2;
  string emoji = 3;
}

message RemoveReactionRequest {
  string message_id = 1;
  string user_id = 2;
  string reaction_id = 3;
}

// ─── Discussion ──────────────────────────────────────────────

message DiscussionRoomData {
  string id = 1;
  string course_id = 2;
  string instructor_id = 3;
  string created_at = 4;
  string updated_at = 5;
}

message DiscussionMessageData {
  string id = 1;
  string room_id = 2;
  string sender_id = 3;
  string sender_role = 4;
  string content = 5;
  int64 sequence = 6;
  string created_at = 7;
  string updated_at = 8;
}

message CreateDiscussionRoomRequest {
  string course_id = 1;
  string user_id = 2;
  string user_role = 3;
}

message DiscussionRoomResponse {
  oneof result {
    DiscussionRoomData room = 1;
    Error error = 2;
  }
}

message SendDiscussionMessageRequest {
  string room_id = 1;
  string sender_id = 2;
  string sender_role = 3;
  string content = 4;
  string idempotency_key = 5;
}

message DiscussionMessageResponse {
  oneof result {
    DiscussionMessageData message = 1;
    Error error = 2;
  }
}

message GetDiscussionMessagesRequest {
  string room_id = 1;
  string user_id = 2;
  PaginationRequest pagination = 3;
}

message DiscussionMessagesResponse {
  repeated DiscussionMessageData messages = 1;
  int32 total = 2;
}

message GetDiscussionMessagesListResponse {
  oneof result {
    DiscussionMessagesResponse messages = 1;
    Error error = 2;
  }
}

